name: Update download counter

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  update-download-counter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update downloads since baseline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          import os
          import urllib.request

          repo = os.environ["REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          baseline_path = "download-counter-baseline.json"
          badge_path = "downloads-since-2026-07-16.json"

          def fetch_json(url: str):
              request = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.loads(response.read().decode("utf-8"))

          total_downloads = 0
          page = 1
          while True:
              releases = fetch_json(f"https://api.github.com/repos/{repo}/releases?per_page=100&page={page}")
              if not releases:
                  break
              for release in releases:
                  for asset in release.get("assets", []):
                      total_downloads += int(asset.get("download_count") or 0)
              page += 1

          if os.path.exists(baseline_path):
              with open(baseline_path, "r", encoding="utf-8") as handle:
                  baseline = json.load(handle)
          else:
              baseline = {}

          if baseline.get("baseline_total") is None:
              baseline["baseline_total"] = total_downloads
              baseline["started_at"] = baseline.get("started_at") or "2026-07-16T00:00:00+03:00"
              baseline["initialized_at"] = dt.datetime.now(dt.timezone.utc).isoformat()

          baseline["last_total_downloads"] = total_downloads
          baseline["last_checked_at"] = dt.datetime.now(dt.timezone.utc).isoformat()

          downloads_since = max(0, total_downloads - int(baseline["baseline_total"]))
          badge = {
              "schemaVersion": 1,
              "label": "16 Temmuz 2026'dan itibaren indirme",
              "message": str(downloads_since),
              "color": "264653",
          }

          with open(baseline_path, "w", encoding="utf-8") as handle:
              json.dump(baseline, handle, ensure_ascii=False, indent=2)
              handle.write("\n")

          with open(badge_path, "w", encoding="utf-8") as handle:
              json.dump(badge, handle, ensure_ascii=False, indent=2)
              handle.write("\n")
          PY

      - name: Commit counter update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add download-counter-baseline.json downloads-since-2026-07-16.json
          if git diff --cached --quiet; then
            echo "Download counter unchanged."
          else
            git commit -m "Update download counter"
            git push
          fi
